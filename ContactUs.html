<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rowdies&display=swap"
      rel="stylesheet"
    />
    <title>Contact Us</title>
    <link rel="stylesheet" href="CSS_ContactUs.css" />
  </head>
  <body>
    <form action="">
      <div class="body2">
        <div class="Heading">
          <h1>Contact Us</h1>
        </div>
        <p>
          Name * <br />
          <input
            type="text"
            required
            name="name"
            placeholder="Full Name"
            id=""
          />
        </p>
        <p>
          Email * <br />
          <input
            type="email"
            required
            name="email-id"
            id=""
            placeholder="abhinavgtechnical@gmail.com"
          />
        </p>
        <p>
          Phone No : <br />
          <input
            type="number"
            name="phoneNumber"
            id=""
            placeholder="1234567890"
          />
        </p>
        <p>
          Message * <br />
          <textarea name="yourmsg" id="" cols="30" rows="10" placeholder="Write Your Message"></textarea>
        </p>
        <p>
          Subject : * <br />
          <select required name="Subject" id="">
            <option value="">Subject</option>
            <option value="Job Inquiry">Job Inquiry</option>
            <option value="Help">Help</option>
            <option value="Contact to Us">Contact to Us</option>
            <option value="Feedback">Feedback</option>
          </select>
        </p>
        <div class="sub">
          <button class="button">Submit US</button>
        </div>
      </div>
      <p class="credit">Created By ~ Abhinav Maurya</p>
    </form>
  </body>
</html>
